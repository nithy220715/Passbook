name: Flutter APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # ⚙️ Setup Flutter (latest stable)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🔍 Verify environment
      - name: Flutter Doctor
        run: flutter doctor -v

      # 📦 Install dependencies
      - name: Get dependencies
        run: flutter pub get

      # 🛠️ Ensure Android exists (safe fallback)
      - name: Ensure platform
        run: flutter create .

      # 🚀 Build APK
      - name: Build APK
        run: flutter build apk --release

      # ✅ Verify APK exists (QA step)
      - name: Verify APK
        run: |
          ls -lh build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/app-release.apk

      # 📤 Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fintech-apk
          path: build/app/outputs/flutter-apk/app-release.apk
